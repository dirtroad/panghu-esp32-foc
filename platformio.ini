; 胖虎机器人 ESP32 固件 - PlatformIO 配置
; 双轮足平衡控制：FOC 电机 + LQR 平衡 + WiFi 遥控

[env:esp32s3]
platform = espressif32@5.4.0
board = esp32-s3-devkitc-1
framework = arduino

; 串口监视器
monitor_speed = 115200

; 构建参数
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_ARCH_ESP32

; 禁用 PSRAM（板载无 PSRAM）
board_build.arduino.memory_type = qio_opi
    
; 库依赖 - 使用稳定版本
lib_deps = 
    ; SimpleFOC 2.2.3 - 兼容 ESP-IDF 4.x
    https://github.com/simplefoc/Arduino-FOC.git#v2.2.3
    bblanchon/ArduinoJson@^6.21.3
    links2004/WebSockets@^2.3.7

; 上传参数
upload_speed = 921600
upload_port = /dev/cu.usbmodem5B8E0631611

; 分区表
board_build.partitions = min_spiffs.csv
